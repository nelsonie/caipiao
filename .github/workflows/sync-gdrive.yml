name: Sync site to Google Drive

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/sync-gdrive.yml'
  # 允许在 Actions 页面手动触发一次（调试用）
  workflow_dispatch:

concurrency:
  # 同一时刻只跑一次，但不取消进行中的任务（避免 Drive 端半路被打断）
  group: sync-gdrive
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install rclone
        run: |
          curl -fsSL https://rclone.org/install.sh | sudo bash
          rclone version | head -1

      - name: Sync site/ to Google Drive
        env:
          # rclone 支持用环境变量覆盖配置，RCLONE_CONFIG_<REMOTE>_<KEY>=value
          # 这样不用写 rclone.conf 文件，也不会把凭据写到磁盘
          RCLONE_CONFIG_GDRIVE_TYPE: drive
          RCLONE_CONFIG_GDRIVE_SCOPE: drive
          RCLONE_CONFIG_GDRIVE_SERVICE_ACCOUNT_CREDENTIALS: ${{ secrets.GDRIVE_SA_JSON }}
          RCLONE_CONFIG_GDRIVE_ROOT_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          rclone sync ./site gdrive: \
            --exclude '_headers' \
            --exclude 'index.html' \
            --fast-list \
            --stats-one-line \
            --stats 10s \
            --verbose
